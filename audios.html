<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audios Espía Fantasma</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.08);
      --text: #f4f7ff;
      --muted: #b9c2e0;
      --accent: #5eead4;
      --border: rgba(255,255,255,0.15);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #16213f 0%, #0b1020 50%, #05070f 100%);
      padding: 18px;
    }

    .wrap {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }

    .top-link {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .subtle-link {
      color: rgba(244, 247, 255, 0.72);
      font-size: 0.85rem;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .subtle-link:hover,
    .subtle-link:focus-visible {
      color: #ffffff;
      background: rgba(255,255,255,0.09);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0 0 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.4;
    }

    .audio-list {
      display: grid;
      gap: 12px;
    }

    .picker-box {
      margin: 0 0 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      text-align: center;
    }

    .picker-text {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .audio-card {
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .audio-title {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #ffffff;
    }

    .audio-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-play {
      background: linear-gradient(135deg, #5eead4, #3b82f6);
      color: #04101e;
    }

    .btn-pause,
    .btn-stop {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .audio-error {
      margin: 10px 0 0;
      color: #ffd3d3;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .card { padding: 18px; }
      h1 { font-size: 1.6rem; }
      .audio-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top-link">
      <a class="subtle-link" href="index.html">Panel secreto</a>
    </div>

    <section class="card">
      <h1>Audios Espía Fantasma</h1>
      <p class="subtitle">
        Reproduce, pausa o reinicia cada audio.
      </p>

      <div class="picker-box">
        <p class="picker-text">
          Intento cargar los audios desde la carpeta <strong>audios espia fantasma</strong>. Si no aparecen, elige esa carpeta manualmente.
        </p>
        <button id="pickFolderBtn" class="btn-pause" type="button">Elegir carpeta</button>
        <input id="folderInput" type="file" accept="audio/*" webkitdirectory multiple hidden />
      </div>

      <div id="audioList" class="audio-list" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const AUDIO_FOLDER = "audios espia fantasma/";
    const AUDIO_EXTENSIONS = [".mp3", ".wav", ".ogg", ".m4a"];
    const audioList = document.getElementById("audioList");
    const pickFolderBtn = document.getElementById("pickFolderBtn");
    const folderInput = document.getElementById("folderInput");
    const activeAudios = [];

    function stopOtherAudios(currentAudio) {
      activeAudios.forEach((audio) => {
        if (audio !== currentAudio) {
          audio.pause();
        }
      });
    }

    function stopAudio(audio) {
      audio.pause();
      audio.currentTime = 0;
    }

    function isAudioFile(fileName) {
      return AUDIO_EXTENSIONS.some((extension) => fileName.toLowerCase().endsWith(extension));
    }

    function clearAudios() {
      activeAudios.forEach((audio) => {
        audio.pause();
      });
      activeAudios.length = 0;
      audioList.innerHTML = "";
    }

    function createAudioCard(track, index) {
      const audio = track.file ? new Audio(URL.createObjectURL(track.file)) : new Audio(track.src);
      audio.preload = "metadata";
      activeAudios.push(audio);

      const card = document.createElement("article");
      card.className = "audio-card";

      const title = document.createElement("h2");
      title.className = "audio-title";
      title.textContent = track.label || ("Audio " + (index + 1));

      const actions = document.createElement("div");
      actions.className = "audio-actions";

      const error = document.createElement("p");
      error.className = "audio-error";
      error.hidden = true;
      error.textContent = "No se pudo cargar este audio.";

      const playBtn = document.createElement("button");
      playBtn.className = "btn-play";
      playBtn.type = "button";
      playBtn.textContent = "Play";
      playBtn.addEventListener("click", () => {
        stopOtherAudios(audio);
        audio.play().catch(() => {
          error.hidden = false;
        });
      });

      const pauseBtn = document.createElement("button");
      pauseBtn.className = "btn-pause";
      pauseBtn.type = "button";
      pauseBtn.textContent = "Pause";
      pauseBtn.addEventListener("click", () => {
        audio.pause();
      });

      const stopBtn = document.createElement("button");
      stopBtn.className = "btn-stop";
      stopBtn.type = "button";
      stopBtn.textContent = "Stop";
      stopBtn.addEventListener("click", () => {
        stopAudio(audio);
      });

      audio.addEventListener("canplaythrough", () => {
        error.hidden = true;
      });

      audio.addEventListener("error", () => {
        error.hidden = false;
      });

      actions.append(playBtn, pauseBtn, stopBtn);
      card.append(title, actions, error);

      return card;
    }

    function renderAudioTracks(tracks) {
      clearAudios();

      tracks.forEach((track, index) => {
        audioList.appendChild(createAudioCard(track, index));
      });
    }

    function buildTracksFromFileNames(fileNames) {
      return fileNames
        .filter(isAudioFile)
        .slice(0, 4)
        .map((fileName, index) => ({
          label: "Audio " + (index + 1),
          src: AUDIO_FOLDER + fileName
        }));
    }

    function buildTracksFromFiles(files) {
      return files
        .filter((file) => isAudioFile(file.name))
        .slice(0, 4)
        .map((file, index) => ({
          label: "Audio " + (index + 1),
          file
        }));
    }

    async function tryLoadFromFolder() {
      try {
        const response = await fetch(encodeURI(AUDIO_FOLDER));
        if (!response.ok) {
          return false;
        }

        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const fileNames = Array.from(doc.querySelectorAll("a"))
          .map((link) => link.getAttribute("href") || "")
          .filter((href) => href && href !== "../");

        const tracks = buildTracksFromFileNames(fileNames);
        if (!tracks.length) {
          return false;
        }

        renderAudioTracks(tracks);
        return true;
      } catch (error) {
        return false;
      }
    }

    function loadFromSelectedFolder() {
      const files = Array.from(folderInput.files || []);
      const tracks = buildTracksFromFiles(files);

      if (!tracks.length) {
        return;
      }

      renderAudioTracks(tracks);
    }

    pickFolderBtn.addEventListener("click", () => {
      folderInput.click();
    });

    folderInput.addEventListener("change", loadFromSelectedFolder);

    async function initAudios() {
      await tryLoadFromFolder();
    }

    initAudios();
  </script>
</body>
</html>
